<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mural 🛠️</title>
    <style>
        :root {
            --fundo-pagina: #111111;
            --fundo-painel: #1c1c1e;
            --borda-brilho: #00e5ff;
            --cor-destaque: #f39c12;
            --texto-principal: #ffffff;
            --texto-secundario: #a0a0a0;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--fundo-pagina); 
            background-image: linear-gradient(135deg, rgba(0, 229, 255, 0.03) 0%, rgba(17, 17, 17, 1) 100%);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            margin: 0; color: var(--texto-principal);
        }

        .painel-login { 
            background: var(--fundo-painel); padding: 40px; border-radius: 20px; 
            max-width: 400px; width: 100%; border: 2px solid var(--borda-brilho); 
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.15); 
        }

        h2 { text-align: center; margin-bottom: 10px; text-shadow: 0 0 10px var(--borda-brilho); }
        p { text-align: center; color: var(--texto-secundario); margin-bottom: 30px; font-size: 14px; }

        /* ESTILO PARA ALERTAS DE ERRO */
        .msg-erro {
            background: rgba(255, 68, 68, 0.1);
            color: #ff4444;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid #ff4444;
        }

        label { display: block; margin-bottom: 8px; color: var(--texto-secundario); font-size: 14px; }
        
        input { 
            width: 100%; padding: 12px; margin-bottom: 20px; 
            background: #111; border: 1px solid #333; border-radius: 8px; 
            color: white; box-sizing: border-box; font-size: 16px;
        }
        input:focus { border-color: var(--borda-brilho); outline: none; }

        .btn-entrar { 
            background: var(--cor-destaque); color: #111; border: none; 
            padding: 15px; width: 100%; border-radius: 8px; 
            font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-entrar:hover { background: #e67e22; transform: translateY(-2px); }

        .links { text-align: center; margin-top: 25px; }
        .links a { color: var(--borda-brilho); text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

    <div class="painel-login">
        <h2>Bem-vindo de volta!</h2>
        <p>Faça login para gerenciar seus serviços.</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="msg-erro">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST">
            <label>Seu E-mail</label>
            <input type="email" name="email" placeholder="email@exemplo.com" required>
            
            <label>Sua Senha</label>
            <input type="password" name="senha" placeholder="Sua senha secreta" required>

            <button type="submit" class="btn-entrar">Entrar no Mural</button>
        </form>
        
        <div class="links">
            <a href="{{ url_for('cadastro_usuario') }}">Ainda não tem conta? Criar agora</a><br><br>
            <a href="/" style="color: #666;">← Voltar para o mural</a>
        </div>
    </div>

</body>
</html>
